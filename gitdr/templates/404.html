{% extends "base.html" %}
{% block title %}404 Not Found — GitDR{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px;">
  <div style="text-align:center;max-width:400px;">
    <div style="font-family:'Syne',sans-serif;font-size:120px;font-weight:800;
                color:var(--b1);line-height:1;letter-spacing:-6px;margin-bottom:8px">
      404
    </div>
    <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
                color:var(--text);margin-bottom:12px">
      Page not found
    </div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.6">
      The page you're looking for doesn't exist or has been moved.
    </div>
    <a href="/" class="btn btn-primary">← Back to Dashboard</a>
  </div>
</div>
{% endblock %}
